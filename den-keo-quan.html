<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bùi Hiểu Lợi - Đèn Kéo Quân 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Nút quay lại trang chủ */
        .btn-back {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: #ff0055;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #fff;
            color: #ff0055;
            box-shadow: 0 0 15px #ff0055;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            text-align: center;
            text-shadow: 0 0 10px #ff0055;
        }

        p {
            color: #aaa;
            margin-bottom: 50px;
            text-align: center;
        }

        /* Sân khấu 3D */
        .stage {
            width: 250px;
            height: 250px;
            perspective: 1000px; /* Tạo chiều sâu cho không gian 3D */
            margin-bottom: 50px;
        }

        /* Lồng đèn xoay */
        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: spin 15s linear infinite; /* Animation tự động quay */
        }

        /* Hiệu ứng quay 360 độ */
        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* Định dạng 6 mặt của đèn kéo quân */
        .carousel-face {
            position: absolute;
            width: 240px;
            height: 240px;
            left: 5px;
            top: 5px;
            border: 4px solid #ff0055;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
            background: #222;
        }

        .carousel-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sắp xếp 6 bức ảnh thành hình lục giác trong không gian 3D (xoay các góc 60, 120, 180, 240, 300 độ) */
        /* translateZ(220px) đẩy các bức ảnh ra xa tâm để tạo thành lồng rỗng */
        .carousel-face:nth-child(1) { transform: rotateY(0deg) translateZ(220px); }
        .carousel-face:nth-child(2) { transform: rotateY(60deg) translateZ(220px); }
        .carousel-face:nth-child(3) { transform: rotateY(120deg) translateZ(220px); }
        .carousel-face:nth-child(4) { transform: rotateY(180deg) translateZ(220px); }
        .carousel-face:nth-child(5) { transform: rotateY(240deg) translateZ(220px); }
        .carousel-face:nth-child(6) { transform: rotateY(300deg) translateZ(220px); }

    </style>
</head>
<body>

    <a href="index.html" class="btn-back">← Quay lại Portfolio</a>
    <h1>ĐÈN KÉO QUÂN 3D</h1>
    <p>Rê chuột vào hình ảnh để dừng đèn quay, di chuột ra ngoài để quay tiếp</p>

    <!-- Sân khấu đèn kéo quân -->
    <div class="stage">
        <div class="carousel" id="carousel">
            <!-- Hiển thị 6 ảnh cá nhân của bạn -->
            <div class="carousel-face"><img src="images/anh1.jpg" alt="Ảnh 1"></div>
            <div class="carousel-face"><img src="images/anh2.jpg" alt="Ảnh 2"></div>
            <div class="carousel-face"><img src="images/anh3.jpg" alt="Ảnh 3"></div>
            <div class="carousel-face"><img src="images/anh4.jpg" alt="Ảnh 4"></div>
            <div class="carousel-face"><img src="images/anh5.jpg" alt="Ảnh 5"></div>
            <div class="carousel-face"><img src="images/anh6.jpg" alt="Ảnh 6"></div>
        </div>
    </div>

    <!-- JavaScript xử lý sự kiện rê chuột (Hover) -->
    <script>
        const carousel = document.getElementById('carousel');

        // Khi di chuột vào: Pause animation xoay tròn
        carousel.addEventListener('mouseenter', () => {
            carousel.style.animationPlayState = 'paused';
        });

        // Khi rê chuột ra ngoài: Chạy tiếp animation xoay tròn
        carousel.addEventListener('mouseleave', () => {
            carousel.style.animationPlayState = 'running';
        });
    </script>
</body>
</html>
